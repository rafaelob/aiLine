# AiLine -- Docker Compose (full stack)
# Services: DB (Postgres 16 + pgvector) | Redis 7 | Migrations | API | Frontend
# Usage:
#   docker compose up -d --build        # Full stack (dev, with override)
#   docker compose -f docker-compose.yml up -d --build  # Production-like
#   docker compose ps                   # Health status
#   docker compose logs -f api          # Follow API logs
name: ailine

# ---------------------------------------------------------------------------
# Shared anchors (DRY)
# ---------------------------------------------------------------------------
x-logging-default: &logging-default
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-db-env: &db-env
  AILINE_DB_URL: postgresql+asyncpg://${POSTGRES_USER:-ailine}:${POSTGRES_PASSWORD:-ailine_dev}@db:5432/${POSTGRES_DB:-ailine}

x-redis-env: &redis-env
  AILINE_REDIS_URL: redis://:${REDIS_PASSWORD:-ailine_redis_dev}@redis:6379/0

x-api-build: &api-build
  context: .
  dockerfile: runtime/Dockerfile
  args:
    INSTALL_DEV: "true"

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --- Data Layer -----------------------------------------------------------

  db:
    image: pgvector/pgvector:0.8.2-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ailine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ailine_dev}
      POSTGRES_DB: ${POSTGRES_DB:-ailine}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5411}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    logging: *logging-default
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.4-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ailine_redis_dev}
    command: >-
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-ailine_redis_dev}
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6311}:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Migrations (one-shot, runs before API) --------------------------------

  migrations:
    build: *api-build
    command: >-
      python -m alembic -c alembic.ini upgrade head
    working_dir: /app
    environment:
      <<: *db-env
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - backend
    logging: *logging-default
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Backend API -----------------------------------------------------------

  api:
    build: *api-build
    ports:
      - "${API_HOST_PORT:-8011}:8000"
    environment:
      <<: [*db-env, *redis-env]
      AILINE_LLM_PROVIDER: ${AILINE_LLM_PROVIDER:-anthropic}
      AILINE_CORS_ORIGINS: "http://localhost:3011,http://127.0.0.1:3011,http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000"
      AILINE_DEV_MODE: "${AILINE_DEV_MODE:-false}"
      AILINE_DEMO_MODE: "${AILINE_DEMO_MODE:-0}"
      AILINE_JWT_SECRET: "${AILINE_JWT_SECRET:-}"
      AILINE_LOCAL_STORE: /app/.local_store
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 30s
    restart: unless-stopped
    networks:
      - backend
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Frontend (Next.js 16) ------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HOST_PORT:-3011}:3000"
    environment:
      API_INTERNAL_URL: http://api:8000
      HOSTNAME: "0.0.0.0"
      NODE_OPTIONS: "--max-old-space-size=1536"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || curl -sf http://127.0.0.1:3000 > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - frontend
    logging: *logging-default
    deploy:
      resources:
        limits:
          memory: 2G

# ---------------------------------------------------------------------------
# Volumes & Networks
# ---------------------------------------------------------------------------
volumes:
  pgdata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
