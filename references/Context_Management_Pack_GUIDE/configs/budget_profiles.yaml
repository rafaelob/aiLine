# Budget profiles for Context Management Pack (SOTA)
# date: 2026-02-24
#
# Notes:
# - mode: ratio budgets scale with window size (after output reserve + safety margin).
# - utilization_target_ratio (optional): use only a fraction of (window - reserves) as the *effective* input budget.
#   This is useful for long-running / sessão contínua (steady-state watermark) while keeping headroom for bursts.
# - min/max protect invariants and prevent slice bloat.
# - Use these as starting points; tune with observability.

profiles:

  balanced_350k:
    window_tokens: 350000
    reserve_output_tokens: 8000
    safety_margin_tokens: 2000
    mode: ratio
    slices:
      system_dev: { ratio: 0.07, min: 10000, max: 35000 }
      skills_index: { ratio: 0.01, min: 1000, max: 7000 }
      skills_active: { ratio: 0.10, min: 8000, max: 60000 }
      state_json: { ratio: 0.05, min: 5000, max: 25000 }
