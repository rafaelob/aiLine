  # -------------------------------------------------
  # Perfis 400k (exemplos) + steady/burst para sessão contínua
  #
  # Modelagem recomendada:
  # - window_tokens = capacidade do modelo (ex.: 400k)
  # - reserve_output_tokens = output esperado (e/ou buffer de output)
  # - safety_margin_tokens = headroom operacional (para bursts, variações e evitar overflow)
  # - utilization_target_ratio = watermark de steady-state (sessão contínua)
  #
  # Exemplo alinhado ao seu cenário:
  # - hard cap de input ~350k dentro de 400k (reserve_output=8k, safety_margin=42k)
  # - steady-state ~240k em sessão contínua (utilization_target_ratio ~ 240/350 = 0.686)
  # -------------------------------------------------

  balanced_400k_hardcap_350k:
    window_tokens: 400000
    reserve_output_tokens: 8000
    safety_margin_tokens: 42000
    utilization_target_ratio: 1.0
    mode: ratio
