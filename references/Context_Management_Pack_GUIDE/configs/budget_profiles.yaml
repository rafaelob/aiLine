dynamic_reallocation_rules:
  - if: { expected_tool_calls_gte: 3 }
    shift:
      tool_results: +0.05
      history_recency: -0.03
      skills_active: -0.02
  - if: { rag_required: true }
    shift:
      rag_evidence: +0.05
      tool_results: -0.03
      history_recency: -0.02
  - if: { risk_level: high }
    shift:
      state_json: +0.04
      rag_evidence: +0.04
      tool_results: -0.04
      history_recency: -0.04
