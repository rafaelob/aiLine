# Dev/test overrides for AiLine Docker Compose.
# Automatically merged with docker-compose.yml when running `docker compose up`.
# For production-like mode: docker compose -f docker-compose.yml up -d --build
#
# Adds:
# - Frontend built from "test" stage (devDeps for pnpm test/typecheck)
# - Frontend dev server with hot reload
# - API source volume mount for live reload (uvicorn --reload)
# - Dev mode enabled by default
services:

  api:
    volumes:
      - ./runtime/ailine_runtime:/app/ailine_runtime:ro
      - ./runtime/tests:/app/tests:ro
      - ./agents/ailine_agents:/usr/local/lib/python3.13/site-packages/ailine_agents:ro
      - ./skills:/app/skills:ro
    command: ["uvicorn", "ailine_runtime.api.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/ailine_runtime"]
    environment:
      AILINE_DEV_MODE: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: test
    command: ["pnpm", "dev", "--hostname", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
